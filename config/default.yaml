# tooluse-generator — default configuration
# All values shown are defaults. Override in a custom YAML or via CLI flags.
# Paths support environment variable expansion: e.g. $HOME/mydata

# ── LLM model identifiers ────────────────────────────────────────────────────
models:
  # Assistant agent: drives tool selection and conversation turns
  assistant: "gpt-4o-mini"
  # LLM-as-judge: scores generated conversations on quality dimensions
  judge: "gpt-4o-mini"
  # User simulator: generates realistic user messages and follow-ups
  user_simulator: "gpt-4o-mini"
  # Mock generator: produces schema-consistent tool response payloads
  mock_generator: "gpt-4o-mini"
  # Sentence-transformer used for semantic edges in the Tool Graph
  embedding: "all-MiniLM-L6-v2"

# ── Quality thresholds and repair settings ───────────────────────────────────
quality:
  # Minimum mean judge score (1.0–5.0) required to accept a conversation
  min_score: 3.5
  # Maximum repair attempts before a conversation is discarded
  max_retries: 3
  # Scoring dimensions evaluated by the LLM judge (order matters for prompts)
  dimensions:
    - tool_correctness      # Did the assistant call the right tools with valid args?
    - argument_grounding    # Are later-step args grounded in prior outputs?
    - task_completion       # Did the assistant fully resolve the user's request?
    - naturalness           # Does the conversation read naturally and coherently?

# ── Tool-chain sampling parameters ───────────────────────────────────────────
sampling:
  # Minimum tool calls in a generated conversation (must be < max_steps)
  min_steps: 2
  # Maximum tool calls in a generated conversation
  max_steps: 5
  # Cosine similarity threshold for adding semantic edges between tools (0–1)
  similarity_threshold: 0.7
  # Restrict to these ToolBench domains; null = use all available domains
  domains: null
  # Tool endpoint IDs to always exclude from sampling; null = no exclusions
  excluded_tools: null

# ── Cross-conversation diversity steering ────────────────────────────────────
diversity:
  # Set to false to disable steering (Run A in the diversity experiment)
  enabled: true
  # Exponential decay for inverse-frequency tool weights (0 < decay ≤ 1)
  # Higher values cause the recency penalty to fade faster
  weight_decay: 0.9
  # Target domain-coverage fraction before any domain is repeated
  min_domain_coverage: 0.5

# ── File-system paths (support $ENV_VAR expansion) ───────────────────────────
paths:
  # Where `tooluse build` writes the graph, registry, and index artifacts
  build_dir: "./output/build"
  # Root directory for generated conversation JSONL files
  output_dir: "./output"
  # Intermediate cache: embeddings, mock-response templates, etc.
  cache_dir: "./.cache"

# ── Global settings ──────────────────────────────────────────────────────────
# Random seed for reproducible sampling and generation
seed: 42
# Verbosity level: 0 = normal, 1 = verbose, 2 = debug
verbose: 0
